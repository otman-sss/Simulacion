<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>8 Reinas - Simulación Interactiva</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-container">
    <div class="chess-panel">
        <canvas id="boardCanvas"></canvas>
        
        <div class="controls">
            <div class="ctrl-group">
                <label>🎨 Tablero</label>
                <select id="themeSelect">
                    <option value="classic">Clásico madera</option>
                    <option value="emerald">Esmeralda & Ébano</option>
                    <option value="sunset">Atardecer real</option>
                </select>
            </div>
            
            <div class="ctrl-group">
                <label>👑 Reina</label>
                <select id="pieceStyle">
                    <option value="queen1">👑 Corona Real</option>
                    <option value="queen2">⚜️ Reina Flor</option>
                    <option value="queen3">♕ Reina Élite</option>
                </select>
            </div>
            
            <div class="ctrl-group">
                <label>⚡ Ataque</label>
                <select id="attackColorSelect">
                    <option value="#ff6666">Rojo intenso</option>
                    <option value="#ffb347">Naranja fuego</option>
                    <option value="#dd44aa">Magenta amenaza</option>
                    <option value="#66ffcc">Cian eléctrico</option>
                </select>
            </div>
            
            <div class="ctrl-group">
                <button id="resetBtn">🔄 Reiniciar</button>
                <button id="clearBtn">🧹 Limpiar todo</button>
            </div>
        </div>
        
        <div class="controls">
            <div class="ctrl-group">
                <span>📌 Soluciones:</span>
                <button id="sol1Btn">Solución 1</button>
                <button id="sol2Btn">Solución 2</button>
                <button id="sol3Btn">Solución 3</button>
            </div>
            
            <div class="ctrl-group">
                <span>🔒 Bloquear/Desbloquear</span>
                <button id="toggleLockMode">🔓 Modo bloqueo</button>
            </div>
        </div>
        
        <div class="status" id="statusMsg">
            🧩 Haz clic en casilla para colocar/quitar reina | Modo bloqueo inactivo
        </div>
    </div>
</div>
<script src="js/functions.js"></script>
</body>
</html>
